name: voicetask
description: "VoiceTask — Gestor de Tarefas por Voz. AMI Final Project 2025/2026."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  provider: ^6.1.2

  # Voice
  speech_to_text: ^7.0.0

  # Sensors / location / notifications
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  http: ^1.2.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^12.0.1

  # Audio
  audioplayers: ^6.1.0

  # Persistence
  shared_preferences: ^2.3.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
